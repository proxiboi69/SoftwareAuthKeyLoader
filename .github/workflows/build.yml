name: Build SAKL Serial

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: win-x64
            artifact: sakl-win-x64
          - rid: win-arm64
            artifact: sakl-win-arm64

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine suffix
        id: suffix
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            echo "VALUE=-${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "VALUE=" >> $env:GITHUB_OUTPUT
          }

      - name: Restore
        run: dotnet restore src/SaklSerial/SaklSerial.csproj

      - name: Test
        run: dotnet test src/SaklSerial.Tests/SaklSerial.Tests.csproj -c Release

      - name: Publish single-file
        run: >
          dotnet publish src/SaklSerial/SaklSerial.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=true
          -o publish/${{ matrix.artifact }}

      - name: Rename EXE
        shell: pwsh
        run: |
          Copy-Item "publish/${{ matrix.artifact }}/sakl.exe" "sakl-${{ matrix.rid }}${{ steps.suffix.outputs.VALUE }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: sakl-${{ matrix.rid }}${{ steps.suffix.outputs.VALUE }}.exe
          retention-days: 30

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: SAKL ${{ github.ref_name }}
          body: |
            Version ${{ github.ref_name }}
          files: |
            artifacts/sakl-win-x64/sakl-win-x64-${{ github.ref_name }}.exe
            artifacts/sakl-win-arm64/sakl-win-arm64-${{ github.ref_name }}.exe
